<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسرع التحميل الذكي</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; }
        .progress-container { width: 100%; background: #334155; border-radius: 10px; margin: 20px 0; height: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.3s; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:disabled { background: #64748b; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 مسرع التحميل المتعدد</h2>
    <p>سيتم تقسيم الملف إلى 8 مسارات تحميل لضمان أقصى سرعة</p>
    
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    
    <button id="download-btn">ابدأ التحميل السريع الآن</button>
    <div id="status">جاهز للبدء...</div>
</div>

<script>
    const fileUrl = "https://release-assets.githubusercontent.com/github-production-release-asset/23216272/97d75124-837c-4f83-834d-525694b2ed02?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-05-13T11%3A45%3A40Z&rscd=attachment%3B+filename%3DGit-2.54.0-64-bit.exe&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-05-13T10%3A44%3A59Z&ske=2026-05-13T11%3A45%3A40Z&sks=b&skv=2018-11-09&sig=0sZE6yHJ0QLk%2F4eDCMTsuoVsInWBYaDfbSBhD%2BqVco4%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc3ODY3MTQ0MiwibmJmIjoxNzc4NjY5NjQyLCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.8eUZuHvu9c9QiBMbaJIin9Waj6pPYM_Chpu12UPqQFg&response-content-disposition=attachment%3B%20filename%3DGit-2.54.0-64-bit.exe&response-content-type=application%2Foctet-stream";
    const fileName = "Git-2.54.0-64-bit.exe";
    const numThreads = 8; // عدد المسارات المتوازية

    document.getElementById('download-btn').onclick = async function() {
        const btn = this;
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerText = "جاري الاتصال وفتح المسارات...";

        try {
            // 1. معرفة حجم الملف الكلي
            const response = await fetch(fileUrl, { method: 'HEAD' });
            const fileSize = parseInt(response.headers.get('content-length'));
            const chunkSize = Math.floor(fileSize / numThreads);
            
            const chunks = [];
            let loaded = 0;

            status.innerText = "جاري التحميل المتعدد (Multi-connection)...";

            // 2. تحميل الأجزاء بالتوازي
            const downloadPromises = Array.from({ length: numThreads }).map(async (_, i) => {
                const start = i * chunkSize;
                const end = (i === numThreads - 1) ? fileSize - 1 : (start + chunkSize - 1);
                
                const chunkRes = await fetch(fileUrl, {
                    headers: { 'Range': `bytes=${start}-${end}` }
                });
                
                const reader = chunkRes.body.getReader();
                const data = new Uint8Array(end - start + 1);
                let offset = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    data.set(value, offset);
                    offset += value.length;
                    loaded += value.length;
                    
                    // تحديث شريط التقدم
                    const pct = Math.floor((loaded / fileSize) * 100);
                    bar.style.width = pct + '%';
                }
                return data;
            });

            const results = await Promise.all(downloadPromises);

            // 3. تجميع الأجزاء وتحميل الملف
            status.innerText = "جاري تجميع الملف وحفظه...";
            const blob = new Blob(results, { type: 'application/octet-stream' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            
            status.innerText = "تم التحميل بنجاح!";
            btn.disabled = false;

        } catch (error) {
            status.innerText = "خطأ: تأكد من أن الموقع يدعم الـ Range Requests أو جرب تعطيل الـ CORS";
            console.error(error);
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
