<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 Clipboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --card: #2a2a3e;
      --card-border: #3a3a5e;
      --accent: #6c5ce7;
      --accent-hover: #7d6ff0;
      --text: #e0e0e0;
      --text-muted: #888;
      --code-bg: #111827;
      --error: #e74c3c;
      --input-bg: #1e1e2e;
      --input-border: #444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--card-border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .header-left { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Feed ── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Item cards ── */
    .item-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .item-type-badge {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .item-actions { display: flex; gap: 6px; }
    .btn-action {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-action:hover { color: var(--text); }
    .btn-delete:hover { color: var(--error); border-color: var(--error); }
    .item-timestamp { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

    /* ── Text items ── */
    .item-text-content { line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

    /* ── Code items ── */
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .lang-badge {
      font-size: 11px;
      background: #333;
      color: #aaa;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .code-block {
      background: var(--code-bg);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
    .code-block code {
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
    }

    /* ── Image items ── */
    .item-image {
      max-width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      cursor: zoom-in;
    }

    /* ── File items ── */
    .file-row { display: flex; align-items: center; gap: 12px; }
    .file-icon { font-size: 28px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-weight: 500; word-break: break-all; }
    .file-size { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .btn-download {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .btn-download:hover { background: var(--accent-hover); }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--card-border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #input-text {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #input-text:focus { outline: none; border-color: var(--accent); }
    #input-text::placeholder { color: var(--text-muted); }
    .input-btn {
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .input-btn:hover { color: var(--text); }
    #btn-send {
      background: var(--card);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #btn-send:hover:not(:disabled) { background: var(--accent-hover); }
    #btn-send:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
    #lang-chip {
      display: none;
      font-size: 11px;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      align-self: center;
      flex-shrink: 0;
    }
    #lang-chip.visible { display: block; }

    /* ── PAT Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #modal-overlay.hidden { display: none; }
    #modal {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 28px;
      width: min(400px, 90vw);
    }
    #modal h2 { margin-bottom: 10px; font-size: 18px; }
    #modal p { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
    #modal code { background: #333; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    #modal-token-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    #modal-token-input:focus { outline: none; border-color: var(--accent); }
    #modal-save-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #modal-save-btn:hover { background: var(--accent-hover); }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
      gap: 8px;
    }
    #empty-state.visible { display: flex; }
    #empty-state .empty-icon { font-size: 40px; }

    /* ── Error bar ── */
    #error-bar {
      font-size: 13px;
      color: var(--error);
      padding: 4px 16px;
      min-height: 0;
      display: none;
    }
    #error-bar.visible { display: block; }

    /* ── Drag overlay ── */
    #drag-overlay {
      position: fixed;
      inset: 0;
      background: rgba(108,92,231,0.12);
      border: 3px dashed var(--accent);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      font-size: 22px;
      color: var(--accent);
      font-weight: 600;
      pointer-events: none;
    }
    #drag-overlay.active { display: flex; }

    /* ── Upload progress ── */
    #upload-progress {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 16px;
      display: none;
    }
    #upload-progress.visible { display: block; }
  </style>
</head>
<body>

<header id="header">
  <div class="header-left">
    <span>📋</span>
    <span>Clipboard</span>
  </div>
  <button id="btn-token" class="btn-ghost">⚙ Token</button>
</header>

<main id="feed">
  <div id="empty-state">
    <div class="empty-icon">📋</div>
    <p>Nothing here yet. Paste something below.</p>
  </div>
</main>

<div id="upload-progress"></div>
<div id="error-bar"></div>

<div id="input-bar">
  <textarea id="input-text" placeholder="Paste or type..." rows="1"></textarea>
  <span id="lang-chip" title="Click to treat as plain text"></span>
  <button id="btn-attach" class="input-btn" title="Attach file">📎</button>
  <input type="file" id="file-input" style="display:none">
  <button id="btn-send" disabled>↑</button>
</div>

<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h2>GitHub Token</h2>
    <p>Enter a GitHub Personal Access Token to use Clipboard.<br><br>
      Classic PAT: enable <code>public_repo</code> scope.<br>
      Fine-grained PAT: enable <em>Contents</em> + <em>Git database</em> read/write on this repo.
    </p>
    <input type="password" id="modal-token-input" placeholder="ghp_...">
    <button id="modal-save-btn">Save &amp; Continue</button>
  </div>
</div>

<div id="loading-overlay">
  <div class="spinner"></div>
</div>

<div id="drag-overlay">Drop file to upload ↓</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const OWNER       = 'fareeddoings-dev';
const REPO        = 'Fareed';
const BRANCH      = 'main';
const INDEX_PATH  = 'clipboard/index.json';
const UPLOADS_DIR = 'clipboard/uploads';
const RAW_BASE    = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}`;
const API_BASE    = `https://api.github.com/repos/${OWNER}/${REPO}`;
const MAX_BYTES   = 50 * 1024 * 1024; // 50 MB

// ── State ────────────────────────────────────────────────────────────────────
let items     = [];    // current clipboard items (newest-first)
let indexSha  = null;  // SHA of clipboard/index.json, required for writes
let isSending = false; // true while a write is in-flight
let detectedLang = null; // language auto-detected in current input

// ── Helpers ──────────────────────────────────────────────────────────────────
function uid() { return crypto.randomUUID(); }

function timeAgo(ts) {
  const d = Math.floor(Date.now() / 1000 - ts);
  if (d < 60)    return 'just now';
  if (d < 3600)  return `${Math.floor(d / 60)}m ago`;
  if (d < 86400) return `${Math.floor(d / 3600)}h ago`;
  return `${Math.floor(d / 86400)}d ago`;
}

function formatBytes(n) {
  if (n < 1024)    return `${n} B`;
  if (n < 1048576) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / 1048576).toFixed(1)} MB`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Unicode-safe base64 encode/decode (GitHub API stores file content as base64)
function toB64(str) {
  return btoa(new TextEncoder().encode(str).reduce((acc, byte) => acc + String.fromCharCode(byte), ''));
}
function fromB64(b64) {
  return new TextDecoder().decode(Uint8Array.from(atob(b64.replace(/\s/g, '')), c => c.charCodeAt(0)));
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function mimeIcon(mime) {
  if (!mime) return '📄';
  if (mime.startsWith('image/'))       return '🖼️';
  if (mime.startsWith('video/'))       return '🎬';
  if (mime.startsWith('audio/'))       return '🎵';
  if (mime.includes('pdf'))            return '📑';
  if (mime.includes('zip') || mime.includes('compressed')) return '🗜️';
  if (mime.includes('word') || mime.includes('document'))  return '📝';
  if (mime.includes('sheet') || mime.includes('excel'))    return '📊';
  return '📄';
}

// ── GitHub API fetch wrapper ──────────────────────────────────────────────────
async function ghFetch(path, options = {}) {
  const token = localStorage.getItem('gh_token');
  const url   = path.startsWith('http') ? path : `${API_BASE}${path}`;
  const res   = await fetch(url, {
    ...options,
    headers: {
      'Authorization':        `Bearer ${token}`,
      'Accept':               'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type':         'application/json',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    const err  = new Error(body.message || `HTTP ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return res.status === 204 ? null : res.json();
}
// ── Auth ─────────────────────────────────────────────────────────────────────
function getToken()     { return localStorage.getItem('gh_token'); }
function setToken(t)    { localStorage.setItem('gh_token', t.trim()); }
function clearToken()   { localStorage.removeItem('gh_token'); }

function showTokenModal(message) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  const input = document.getElementById('modal-token-input');
  input.value = getToken() || '';
  if (message) {
    const p = overlay.querySelector('p');
    p.insertAdjacentHTML('afterend',
      `<p style="color:var(--error);font-size:13px;margin-bottom:10px">${escHtml(message)}</p>`);
  }
  input.focus();
}

function hideTokenModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  // Remove any error messages added dynamically
  document.querySelectorAll('#modal p + p').forEach(el => el.remove());
}

document.getElementById('modal-save-btn').addEventListener('click', async () => {
  const val = document.getElementById('modal-token-input').value.trim();
  if (!val) return;
  setToken(val);
  hideTokenModal();
  await initApp();
});

document.getElementById('modal-token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-save-btn').click();
});

document.getElementById('btn-token').addEventListener('click', () => showTokenModal());
// ── index.json read/write ────────────────────────────────────────────────────
async function loadIndex() {
  try {
    const data = await ghFetch(`/contents/${INDEX_PATH}`);
    indexSha = data.sha;
    items    = JSON.parse(fromB64(data.content));
  } catch (e) {
    if (e.status === 404) {
      // First run — file doesn't exist yet
      indexSha = null;
      items    = [];
    } else {
      throw e;
    }
  }
}

async function saveIndex() {
  const body = {
    message: 'update clipboard',
    content: toB64(JSON.stringify(items, null, 2)),
    branch:  BRANCH,
  };
  if (indexSha) body.sha = indexSha;
  const res = await ghFetch(`/contents/${INDEX_PATH}`, {
    method: 'PUT',
    body:   JSON.stringify(body),
  });
  indexSha = res.content.sha;
}

// On 409 conflict (another device wrote first): re-fetch, re-insert our item, retry once.
async function saveIndexWithRetry(newItem) {
  try {
    await saveIndex();
  } catch (e) {
    if (e.status === 409) {
      await loadIndex();
      items.unshift(newItem); // re-prepend after fresh fetch
      await saveIndex();      // if this also fails, it propagates to the caller
    } else {
      throw e;
    }
  }
}
// ── UI helpers ────────────────────────────────────────────────────────────────
function showLoading()  { document.getElementById('loading-overlay').classList.remove('hidden'); }
function hideLoading()  { document.getElementById('loading-overlay').classList.add('hidden'); }
function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = '⚠ ' + msg;
  bar.classList.add('visible');
  setTimeout(() => bar.classList.remove('visible'), 6000);
}
function showUploadProgress(msg) {
  const el = document.getElementById('upload-progress');
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}
function setSending(val) {
  isSending = val;
  const btn = document.getElementById('btn-send');
  btn.disabled = val;
  btn.textContent = val ? '⟳' : '↑';
}

// ── Feed rendering ────────────────────────────────────────────────────────────
function renderFeed() {
  const feed   = document.getElementById('feed');
  const empty  = document.getElementById('empty-state');
  // Remove all existing cards (keep #empty-state)
  feed.querySelectorAll('.item-card').forEach(el => el.remove());
  if (items.length === 0) {
    empty.classList.add('visible');
    return;
  }
  empty.classList.remove('visible');
  for (const item of items) {
    const card = buildCard(item);
    if (card) feed.appendChild(card);
  }
}

function buildCard(item) {
  const div = document.createElement('div');
  div.className = 'item-card';
  div.dataset.id = item.id;

  const meta = `
    <div class="item-meta">
      <span class="item-type-badge">${escHtml(item.type)}${item.lang ? ` · ${escHtml(item.lang)}` : ''}</span>
      <div class="item-actions">
        <button class="btn-action btn-copy" onclick="copyItem('${item.id}')">Copy</button>
        <button class="btn-action btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
      </div>
    </div>`;

  let body = '';
  if (item.type === 'text') {
    body = renderTextBody(item);
  } else if (item.type === 'code') {
    body = renderCodeBody(item);
  } else if (item.type === 'image') {
    body = renderImageBody(item);
  } else if (item.type === 'file') {
    body = renderFileBody(item);
  } else {
    return null;
  }

  const ts = `<div class="item-timestamp">${timeAgo(item.ts)}</div>`;
  div.innerHTML = meta + body + ts;
  return div;
}

// ── App init ──────────────────────────────────────────────────────────────────
async function initApp() {
  if (!getToken()) { showTokenModal(); hideLoading(); return; }
  showLoading();
  try {
    await loadIndex();
    renderFeed();
  } catch (e) {
    if (e.status === 401) {
      hideLoading();
      showTokenModal('Invalid token — please re-enter.');
      return;
    }
    showError('Failed to load: ' + e.message);
  } finally {
    hideLoading();
  }
}

// Auto-start
initApp();
// ── Card body renderers ───────────────────────────────────────────────────────
function renderTextBody(item) {
  return `<div class="item-text-content">${escHtml(item.content)}</div>`;
}

function renderCodeBody(item) {
  // highlight.js needs the raw text; hljs.highlight returns { value: html-string }
  let highlighted;
  try {
    if (item.lang && hljs.getLanguage(item.lang)) {
      highlighted = hljs.highlight(item.content, { language: item.lang }).value;
    } else {
      highlighted = hljs.highlightAuto(item.content).value;
    }
  } catch (_) {
    highlighted = escHtml(item.content);
  }
  return `
    <div class="code-header">
      <span></span>
      <span class="lang-badge">${escHtml(item.lang || 'code')}</span>
    </div>
    <div class="code-block"><code>${highlighted}</code></div>`;
}

function renderImageBody(item) {
  // Cache-bust with a timestamp so stale GitHub CDN responses don't linger
  const src = item.url + '?v=' + item.ts;
  return `<img class="item-image" src="${escHtml(src)}" alt="${escHtml(item.name)}"
    onclick="window.open('${escHtml(item.url)}','_blank')">`;
}

function renderFileBody(item) {
  return `
    <div class="file-row">
      <span class="file-icon">${mimeIcon(item.mime)}</span>
      <div class="file-info">
        <div class="file-name">${escHtml(item.name)}</div>
        <div class="file-size">${formatBytes(item.size)}</div>
      </div>
      <a class="btn-download" href="${escHtml(item.url)}" download="${escHtml(item.name)}" target="_blank">
        Download
      </a>
    </div>`;
}

// ── Copy handler ──────────────────────────────────────────────────────────────
function copyItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const text = (item.type === 'text' || item.type === 'code')
    ? item.content
    : item.url;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector(`[data-id="${id}"] .btn-copy`);
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
  });
}
// ── Input bar ─────────────────────────────────────────────────────────────────
const inputText = document.getElementById('input-text');
const langChip  = document.getElementById('lang-chip');

// Auto-grow textarea height
inputText.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  // Enable send button when there's content
  document.getElementById('btn-send').disabled = isSending || !this.value.trim();
});

// Detect code in pasted text
inputText.addEventListener('paste', () => {
  setTimeout(checkCodeDetection, 0); // wait for paste to land
});

function checkCodeDetection() {
  const text = inputText.value.trim();
  if (!text || text.length < 20) {
    clearLangChip(); return;
  }
  try {
    const result = hljs.highlightAuto(text);
    if (result.language && result.relevance >= 5) {
      detectedLang = result.language;
      langChip.textContent = result.language + ' ✕';
      langChip.classList.add('visible');
    } else {
      clearLangChip();
    }
  } catch (_) {
    clearLangChip();
  }
}

function clearLangChip() {
  detectedLang = null;
  langChip.classList.remove('visible');
  langChip.textContent = '';
}

// Clicking the chip dismisses code detection and treats as plain text
langChip.addEventListener('click', clearLangChip);

// Send on Ctrl+Enter / Cmd+Enter
inputText.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('btn-send').click();
  }
});

document.getElementById('btn-send').addEventListener('click', async () => {
  const text = inputText.value.trim();
  if (!text || isSending) return;
  setSending(true);
  let newItem; // declared outside try so catch can reference it for rollback
  try {
    newItem = {
      id:      uid(),
      type:    detectedLang ? 'code' : 'text',
      content: inputText.value,  // preserve original whitespace
      ts:      Math.floor(Date.now() / 1000),
      ...(detectedLang ? { lang: detectedLang } : {}),
    };
    items.unshift(newItem);
    renderFeed();
    inputText.value = '';
    inputText.style.height = 'auto';
    clearLangChip();
    await saveIndexWithRetry(newItem);
  } catch (e) {
    showError('Failed to save: ' + e.message);
    // Rollback: remove the item we optimistically added
    if (newItem) { items = items.filter(i => i.id !== newItem.id); renderFeed(); }
  } finally {
    setSending(false);
    document.getElementById('btn-send').disabled = true;
  }
});
// ── Binary upload ─────────────────────────────────────────────────────────────

// Upload file to clipboard/uploads/ via Git Data API (handles files of any size up to 50MB)
async function uploadBinary(filename, fileBase64) {
  showUploadProgress('Creating blob…');

  // 1. Create blob
  const blobRes = await ghFetch('/git/blobs', {
    method: 'POST',
    body:   JSON.stringify({ content: fileBase64, encoding: 'base64' }),
  });
  const blobSha = blobRes.sha;

  showUploadProgress('Building tree…');

  // 2. Get HEAD ref → commit SHA
  const refRes = await ghFetch(`/git/refs/heads/${BRANCH}`);
  const latestCommitSha = refRes.object.sha;

  // 3. Get the commit to find its tree SHA
  const commitRes = await ghFetch(`/git/commits/${latestCommitSha}`);
  const treeSha   = commitRes.tree.sha;

  // 4. Create new tree containing the uploaded file
  const newTreeRes = await ghFetch('/git/trees', {
    method: 'POST',
    body:   JSON.stringify({
      base_tree: treeSha,
      tree: [{
        path: `${UPLOADS_DIR}/${filename}`,
        mode: '100644',
        type: 'blob',
        sha:  blobSha,
      }],
    }),
  });
  const newTreeSha = newTreeRes.sha;

  showUploadProgress('Committing…');

  // 5. Create commit
  const newCommitRes = await ghFetch('/git/commits', {
    method: 'POST',
    body:   JSON.stringify({
      message: `add clip: ${filename}`,
      tree:    newTreeSha,
      parents: [latestCommitSha],
    }),
  });
  const newCommitSha = newCommitRes.sha;

  // 6. Advance branch ref
  await ghFetch(`/git/refs/heads/${BRANCH}`, {
    method: 'PATCH',
    body:   JSON.stringify({ sha: newCommitSha }),
  });

  showUploadProgress('');
  return {
    blobSha,
    rawUrl: `${RAW_BASE}/${UPLOADS_DIR}/${filename}`,
  };
}

async function handleFileUpload(file) {
  if (isSending) return;
  if (file.size > MAX_BYTES) {
    showError(`File too large: ${formatBytes(file.size)} (max 50 MB)`);
    return;
  }
  setSending(true);
  const isImage  = file.type.startsWith('image/');
  const safeName = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
  try {
    const base64 = await readFileAsBase64(file);
    const { blobSha, rawUrl } = await uploadBinary(safeName, base64);
    const newItem = {
      id:      uid(),
      type:    isImage ? 'image' : 'file',
      name:    file.name,
      mime:    file.type || 'application/octet-stream',
      url:     rawUrl,
      fileSha: blobSha,
      size:    file.size,
      ts:      Math.floor(Date.now() / 1000),
    };
    items.unshift(newItem);
    await saveIndexWithRetry(newItem);
    renderFeed();
  } catch (e) {
    showError('Upload failed: ' + e.message);
  } finally {
    setSending(false);
    showUploadProgress('');
  }
}

// ── File picker ───────────────────────────────────────────────────────────────
document.getElementById('btn-attach').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (file) await handleFileUpload(file);
  e.target.value = ''; // reset so the same file can be re-selected
});

// ── Paste image from clipboard ────────────────────────────────────────────────
inputText.addEventListener('paste', async (e) => {
  for (const clipItem of e.clipboardData.items) {
    if (clipItem.type.startsWith('image/')) {
      e.preventDefault(); // don't paste the image data as text
      const file = clipItem.getAsFile();
      if (file) await handleFileUpload(file);
      return;
    }
  }
  // Non-image paste: Task 8's paste listener handles code detection
});

// ── Drag and drop ─────────────────────────────────────────────────────────────
let dragCounter = 0; // track nested drag events

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  document.getElementById('drag-overlay').classList.add('active');
});
document.addEventListener('dragleave', () => {
  dragCounter--;
  if (dragCounter <= 0) {
    dragCounter = 0;
    document.getElementById('drag-overlay').classList.remove('active');
  }
});
document.addEventListener('dragover', (e) => { e.preventDefault(); });
document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragCounter = 0;
  document.getElementById('drag-overlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) await handleFileUpload(file);
});
